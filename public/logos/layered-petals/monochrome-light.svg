<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-labelledby="logo-title logo-desc">
  <title id="logo-title">Ahmed Work Logo - Layered Petals Light</title>
  <desc id="logo-desc">Monochrome light version of Layered Petals logo for dark backgrounds</desc>
  <g id="petals" fill="#FFFFFF">
    <ellipse cx="50" cy="28" rx="12" ry="18" opacity="0.85" transform="rotate(0, 50, 50)" />
    <ellipse cx="50" cy="28" rx="12" ry="18" opacity="0.8" transform="rotate(45, 50, 50)" />
    <ellipse cx="50" cy="28" rx="12" ry="18" opacity="0.85" transform="rotate(90, 50, 50)" />
    <ellipse cx="50" cy="28" rx="12" ry="18" opacity="0.8" transform="rotate(135, 50, 50)" />
    <ellipse cx="50" cy="28" rx="12" ry="18" opacity="0.85" transform="rotate(180, 50, 50)" />
    <ellipse cx="50" cy="28" rx="12" ry="18" opacity="0.8" transform="rotate(225, 50, 50)" />
    <ellipse cx="50" cy="28" rx="12" ry="18" opacity="0.85" transform="rotate(270, 50, 50)" />
    <ellipse cx="50" cy="28" rx="12" ry="18" opacity="0.8" transform="rotate(315, 50, 50)" />
  </g>
  <circle cx="50" cy="50" r="16" fill="#FFFFFF" />
  <circle cx="50" cy="50" r="10" fill="#FFFFFF" opacity="0.5" />
</svg>