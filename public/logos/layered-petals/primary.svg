<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-labelledby="logo-title logo-desc">
  <title id="logo-title">Ahmed Work Logo - Layered Petals</title>
  <desc id="logo-desc">Overlapping organic circles arranged like sun rays or flower petals</desc>
  <defs>
    <linearGradient id="petalGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8955A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5D88C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="petalGradient2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5D88C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8955A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g id="petals">
    <ellipse cx="50" cy="28" rx="12" ry="18" fill="url(#petalGradient1)" opacity="0.85" transform="rotate(0, 50, 50)" />
    <ellipse cx="50" cy="28" rx="12" ry="18" fill="url(#petalGradient2)" opacity="0.8" transform="rotate(45, 50, 50)" />
    <ellipse cx="50" cy="28" rx="12" ry="18" fill="url(#petalGradient1)" opacity="0.85" transform="rotate(90, 50, 50)" />
    <ellipse cx="50" cy="28" rx="12" ry="18" fill="url(#petalGradient2)" opacity="0.8" transform="rotate(135, 50, 50)" />
    <ellipse cx="50" cy="28" rx="12" ry="18" fill="url(#petalGradient1)" opacity="0.85" transform="rotate(180, 50, 50)" />
    <ellipse cx="50" cy="28" rx="12" ry="18" fill="url(#petalGradient2)" opacity="0.8" transform="rotate(225, 50, 50)" />
    <ellipse cx="50" cy="28" rx="12" ry="18" fill="url(#petalGradient1)" opacity="0.85" transform="rotate(270, 50, 50)" />
    <ellipse cx="50" cy="28" rx="12" ry="18" fill="url(#petalGradient2)" opacity="0.8" transform="rotate(315, 50, 50)" />
  </g>
  <circle cx="50" cy="50" r="16" fill="url(#petalGradient1)" />
  <circle cx="50" cy="50" r="10" fill="#F5D88C" opacity="0.8" />
</svg>