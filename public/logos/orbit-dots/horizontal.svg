<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60" role="img" aria-labelledby="logo-title logo-desc">
  <title id="logo-title">Ahmed Work Logo - Orbit Dots Horizontal</title>
  <desc id="logo-desc">Orbit Dots icon with ahmed.work wordmark</desc>
  <defs>
    <linearGradient id="sunGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8955A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5D88C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g id="icon" transform="translate(0, 5) scale(0.5)">
    <circle cx="50" cy="50" r="18" fill="url(#sunGradient)" />
    <circle cx="50" cy="50" r="12" fill="#F5D88C" opacity="0.7" />
    <g id="orbit-dots">
      <circle cx="50" cy="16" r="6" fill="#E8955A" opacity="0.95" />
      <circle cx="50" cy="84" r="5" fill="#F5D88C" opacity="0.9" />
      <circle cx="16" cy="50" r="5" fill="#E8955A" opacity="0.85" />
      <circle cx="84" cy="50" r="6" fill="#F5D88C" opacity="0.95" />
      <circle cx="26" cy="26" r="4" fill="#F5D88C" opacity="0.8" />
      <circle cx="74" cy="74" r="4" fill="#E8955A" opacity="0.75" />
      <circle cx="74" cy="26" r="5" fill="#E8955A" opacity="0.85" />
      <circle cx="26" cy="74" r="5" fill="#F5D88C" opacity="0.8" />
    </g>
  </g>
  <g id="wordmark">
    <text x="65" y="40" font-family="Georgia, serif" font-size="28" font-weight="700" font-style="italic" fill="#E8955A">ahmed</text>
    <text x="148" y="40" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#4D3D35" opacity="0.8">.work</text>
  </g>
</svg>